<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣公司業績面板 - 穩定版修復</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        body { background-color: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; margin: 0; }
        .active-tab { background-color: #2563eb !important; color: white !important; font-weight: bold; }
        /* 修正圓環圖文字樣式 */
        .recharts-pie-label-text { fill: #64748b !important; font-size: 10px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 核心修復：使用自定義的等待函式，確保 Recharts 真的準備好了
        const checkRechartsLoaded = (callback) => {
            if (window.Recharts && window.Recharts.LineChart) {
                callback();
            } else {
                console.log("等待 Recharts 加載中...");
                setTimeout(() => checkRechartsLoaded(callback), 100);
            }
        };

        checkRechartsLoaded(() => {
            console.log("Recharts 成功加載！開始渲染面板。");
            const { useState } = React;
            const { 
                XAxis, YAxis, CartesianGrid, Tooltip, Legend, 
                ResponsiveContainer, PieChart, Pie, Cell, BarChart, Bar 
            } = window.Recharts;

            const BU_LIST = ["工紙", "家紙", "紙與紙板", "紙器", "紙器特販"];
            const COLORS = ['#1e293b', '#3b82f6', '#10b981', '#f59e0b', '#ef4444'];

            const MetricCard = ({ title, value, unit, isUp, percent, target }) => (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <div className="text-[10px] font-bold text-slate-400 mb-1 tracking-wider uppercase">{title}</div>
                    <div className="text-2xl font-black text-slate-900">{value.toLocaleString()} <span className="text-xs font-normal text-slate-500">{unit}</span></div>
                    <div className="flex justify-between items-center mt-3 text-[10px]">
                        <span className={`font-bold ${isUp ? 'text-green-600' : 'text-red-600'}`}>
                            {isUp ? '▲' : '▼'} {percent}% (MoM)
                        </span>
                        <span className="text-slate-400 font-medium">目標達成 <span className="text-slate-700 font-bold">{target}%</span></span>
                    </div>
                    <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2overflow-hidden">
                        <div className="bg-blue-500 h-full rounded-full" style={{width: `${target}%`}}></div>
                    </div>
                </div>
            );

            const MainApp = () => {
                const [view, setView] = useState('amount');

                return (
                    <div className="flex flex-col min-h-screen">
                        {/* Header */}
                        <header className="bg-slate-900 text-white p-3 flex justify-between items-center shadow-lg sticky top-0 z-50">
                            <span className="font-extrabold tracking-tight text-sm flex items-center gap-2">
                                <span className="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
                                台灣公司產品通路業績表
                            </span>
                            <div className="flex bg-slate-800 p-1 rounded-lg space-x-1 border border-slate-700">
                                {['amount', 'quantity', 'structure'].map(type => (
                                    <button 
                                        key={type}
                                        onClick={()=>setView(type)} 
                                        className={`px-4 py-1 rounded text-xs transition-all duration-150 ${view===type ? 'active-tab shadow-md' : 'hover:bg-slate-700 text-slate-300'}`}
                                    >
                                        {type === 'amount' ? '業績金額' : type === 'quantity' ? '業績數量' : '結構分析'}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <div className="flex flex-1 overflow-hidden">
                            {/* Sidebar Filters */}
                            <aside className="w-44 bg-white border-r border-slate-100 p-4 space-y-4 flex flex-col">
                                <div className="border-b pb-3 mb-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">數據年份</label>
                                    <select className="w-full border border-slate-200 p-1.5 text-xs rounded-md mt-1.5 bg-slate-50 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"><option>2026</option></select>
                                </div>
                                <div className="flex-1 space-y-3">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">維度篩選</label>
                                    <select className="w-full border border-slate-200 p-1.5 text-xs rounded-md bg-slate-50"><option>全公司</option><option>工紙</option></select>
                                    <select className="w-full border border-slate-200 p-1.5 text-xs rounded-md bg-slate-50"><option>市售</option></select>
                                </div>
                                <div className="text-[10px] text-slate-300 text-center border-t pt-3">數據更新: {view==='structure' ? '2025年度' : '當日'}</div>
                            </aside>

                            {/* Content */}
                            <main className="flex-1 p-6 overflow-auto bg-slate-50">
                                {(view === 'amount' || view === 'quantity') && (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                                            <MetricCard title="全公司當日累計" value={view==='amount'?9240500:3200} unit={view==='amount'?'NTD':'噸'} isUp={true} percent={4.2} target={88} />
                                            {BU_LIST.slice(0,3).map(name => (
                                                <MetricCard key={name} title={name} value={1850000} unit={view==='amount'?'NTD':'噸'} isUp={false} percent={1.5} target={76} />
                                            ))}
                                        </div>
                                        <div className="h-72 bg-white rounded-xl border border-dashed border-slate-300 flex items-center justify-center text-slate-400 text-sm shadow-inner p-6 text-center">
                                            此區塊載入中...<br/>(模擬{view==='amount'?'金額':'數量'}數據預覽)
                                        </div>
                                    </div>
                                )}

                                {view === 'structure' && (
                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                                        <div className="bg-white p-5 rounded-xl border border-slate-100 shadow-sm h-80 flex flex-col">
                                            <h4 className="text-sm font-bold text-slate-700 mb-5 border-b pb-3 flex justify-between">
                                                <span>工紙產品結構比例 (銷貨淨額)</span>
                                                <span className="text-xs font-normal text-slate-400">2025累計</span>
                                            </h4>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart margin={{ top: 0, right: 0, bottom: 20, left: 0 }}>
                                                    <Pie data={[{n:'芯紙',v:50},{n:'面紙',v:30},{n:'其他',v:20}]} dataKey="v" nameKey="n" innerRadius={55} outerRadius={75} paddingAngle={2} label>
                                                        {COLORS.map((c,i)=><Cell key={i} fill={c} stroke="none"/>)}
                                                    </Pie>
                                                    <Tooltip contentStyle={{border:'none', borderRadius:'8px', boxShadow:'0 2px 8px rgba(0,0,0,0.1)', fontSize:'12px'}}/>
                                                    <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:'12px', paddingTop:'10px'}}/>
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-slate-100 shadow-sm h-80 flex flex-col">
                                            <h4 className="text-sm font-bold text-slate-700 mb-5 border-b pb-3">近五年產品趨勢變化</h4>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={[{x:'22',v:80},{x:'23',v:95},{x:'24',v:110},{x:'25',v:105},{x:'26',v:130}]} margin={{ top: 10, right: 10, bottom: 20, left: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="x" tick={{fontSize: 11, fill:'#94a3b8'}} axisLine={{stroke:'#e2e8f0'}} tickLine={false} />
                                                    <YAxis tick={{fontSize: 11, fill:'#94a3b8'}} axisLine={false} tickLine={false} hide/>
                                                    <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{border:'none', borderRadius:'8px', boxShadow:'0 2px 8px rgba(0,0,0,0.1)', fontSize:'12px'}}/>
                                                    <Bar dataKey="v" name="銷售額(億)" fill="#3b82f6" radius={[4,4,0,0]} barSize={30} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<MainApp />);
        });
    </script>
</body>
</html>
